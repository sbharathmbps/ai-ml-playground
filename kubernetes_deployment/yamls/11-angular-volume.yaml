---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: angular-pv
  namespace: app
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual
  hostPath:
    path: /mnt/data/ml-platform/containers/Angular   # Host directory to mount
    type: Directory

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: angular-pvc
  namespace: app
  labels:
    app: angular-app
spec:
  storageClassName: manual
  resources:
    requests:
      storage: 10Gi
  accessModes:
    - ReadWriteMany
  volumeName: angular-pv
---
