apiVersion: v1
kind: ServiceAccount
metadata:
  name: fastapi-client
  namespace: app
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: fastapi-client-argo-submit
  namespace: argo
rules:
  - apiGroups: ["argoproj.io"]
    resources:
      - workflows
      - workflowtemplates
      - cronworkflows
      - clusterworkflowtemplates
    verbs:
      - get
      - list
      - watch
      - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: fastapi-client-argo-submit
  namespace: argo
subjects:
  - kind: ServiceAccount
    name: fastapi-client
    namespace: app
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: fastapi-client-argo-submit
