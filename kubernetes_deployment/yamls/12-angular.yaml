apiVersion: apps/v1
kind: Deployment
metadata:
  name: angular-app-deployment
  labels:
    app: angular-app
  namespace: app
spec:
  selector:
    matchLabels:
      app: angular-app
  replicas: 1
  template:
    metadata:
      labels:
        app: angular-app
    spec:
      containers:
      - name: angular-app
        image: angular-ml-platform:latest
        imagePullPolicy: IfNotPresent
        command: ["nginx", "-g", "daemon off;"]
        ports:
        - containerPort: 4200

        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"

        readinessProbe:
          httpGet:
            path: /
            port: 4200
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 5

        livenessProbe:
          httpGet:
            path: /
            port: 4200
          periodSeconds: 30
          timeoutSeconds: 3
          failureThreshold: 5

---
apiVersion: v1
kind: Service
metadata:
  name: angular-app-service
  labels:
    app: angular-app
  namespace: app

spec:
  selector:
    app: angular-app
  ports:
  - protocol: TCP
    port: 4200
    targetPort: 4200
    nodePort: 30420
  type: NodePort
