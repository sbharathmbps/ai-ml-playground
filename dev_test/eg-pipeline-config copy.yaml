apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
    generateName: ml-workflow-
spec:
    imagePullSecrets:
    - name: artifact-registery-secret
    parallelism: 5
    entrypoint: main-dag
    arguments:
      parameters:
      - name: folder_name
      - name: big-assets-l1
        value: "true"
      - name: small-assets-l1
        value: "true"
      - name: small-assets-l15
        value: "true"
      - name: birdnest-and-label
        value: "true"
      - name: lockpin
        value: "true"
      - name: tower--tower-rust-devide
        value: "true"
      - name: tower-crossarms--tower-rust-devide
        value: "true"
      - name: tower-leg--tower-rust-devide
        value: "true"
      - name: tower-peak--tower-rust-devide
        value: "true"
      - name: tower-muff-l2
        value: "true"
      - name: vegetation-l2
        value: "true"
      - name: earthwire-detection
        value: "true"
      - name: vibration-damper-l2
        value: "true"
      - name: arcing-horn-l2 # unet multi model
        value: "true"
      - name: glass-insulator--disc-damage-l2 # detectron 2
        value: "true"
      - name: polymer-insulator--disc-damage-l2 # detectron 2
        value: "true"
      - name: porcelain-insulator--disc-damage-l2 # detectron 2
        value: "true"
      - name: shackles-l2 # unet multi model
        value: "true"
      - name: suspension-clamp-l2 # unet single model
        value: "true"
      - name: tension-clamp-l2 # unet single model
        value: "true"
      - name: birdnest--birdnest-and-label 
        value: "true"
      - name: marker--birdnest-and-label 
        value: "true"
      - name: merge-outputs 
        value: "true"
    volumes:
        - name: infengine-data
          persistentVolumeClaim:
            claimName: host-mnt-pvc
        - name: input-data
          persistentVolumeClaim:
            claimName: image-input-pvc

    templates:
          - name: main-dag
            dag:
                tasks:
                  # Level 1: 5 parallel jobs
                  - name: big-assets-l1
                    template: efficient-d2-template
                    when: "{{workflow.parameters.big-assets-l1}} == true"
                    arguments:
                        parameters: 
                        - name: assets
                          value: '{{workflow.parameters.assets}}'
                        - name: grouped_assets
                          value: '[]'
                        - name: src
                          value: "/input/{{workflow.parameters.folder_name}}/"
                        - name: dest
                          value: "/input/{{workflow.parameters.folder_name}}/output/"
                        - name: config
                          value: "/mnt/pipeline-configs/ukpn_v2/big_assets_l1.json"
                        - name: start_msg
                          value: '["tower", "tower_crossarms", "tower_leg", "tower_peak", "tower_muff"]'
                        - name: end_msg
                          value: '[]'
                  
                  - name: small-assets-l1
                    template: detectron2-template
                    when: "{{workflow.parameters.small-assets-l1}} == true"
                    arguments:
                        parameters: 
                        - name: assets
                          value: '{{workflow.parameters.assets}}'
                        - name: grouped_assets
                          value: '[]'
                        - name: src
                          value: "/input/{{workflow.parameters.folder_name}}/"
                        - name: dest
                          value: "/input/{{workflow.parameters.folder_name}}/output/"
                        - name: config
                          value: "/mnt/pipeline-configs/ukpn_v2/small_asset_l1.json"
                        - name: start_msg
                          value: '["earthwire_connection", "vibration_damper"]'
                        - name: end_msg
                          value: '[]'

                  - name: small-assets-l15
                    template: detectron2-template
                    depends: "small-assets-l1"
                    when: "{{workflow.parameters.small-assets-l15}} == true"
                    arguments:
                        parameters: 
                        - name: assets
                          value: '{{workflow.parameters.assets}}'
                        - name: grouped_assets
                          value: '[]'
                        - name: src
                          value: "/input/{{workflow.parameters.folder_name}}/output/Level1/insulator/"
                        - name: dest
                          value: "/input/{{workflow.parameters.folder_name}}/output/"
                        - name: config
                          value: "/mnt/pipeline-configs/ukpn_v2/small_l15.json"
                        - name: start_msg
                          value: '["arcing_horn", "glass_insulator", "polymer_insulator", "porcelain_insulator", "shackles","suspension_clamp", "tension_clamp"]'
                        - name: end_msg
                          value: '[]'
                  
                  - name: birdnest-and-label
                    template: detectron2-template
                    when: "{{workflow.parameters.birdnest-and-label}} == true"
                    arguments:
                        parameters: 
                        - name: assets
                          value: '{{workflow.parameters.assets}}'
                        - name: grouped_assets
                          value: '[]'
                        - name: src
                          value: "/input/{{workflow.parameters.folder_name}}/"
                        - name: dest
                          value: "/input/{{workflow.parameters.folder_name}}/output/"
                        - name: config
                          value: "/mnt/pipeline-configs/ukpn_v2/birdnest.json"
                        - name: start_msg
                          value: '["birdnest", "marker"]'
                        - name: end_msg
                          value: '[]'

                  - name: lockpin
                    template: detectron2-template
                    when: "{{workflow.parameters.lockpin}} == true"
                    arguments:
                        parameters: 
                        - name: assets
                          value: '{{workflow.parameters.assets}}'
                        - name: grouped_assets
                          value: '[]'
                        - name: src
                          value: "/input/{{workflow.parameters.folder_name}}/"
                        - name: dest
                          value: "/input/{{workflow.parameters.folder_name}}/output/"
                        - name: config
                          value: "/mnt/pipeline-configs/ukpn_v2/lockpin.json"
                        - name: start_msg
                          value: '["AOI", "head", "with_lockpin", "without_lockpin"]'
                        - name: end_msg
                          value: '[]'

                  #  big assets L2 ----------------------------------
               
                  - name: tower--tower-rust-devide
                    template: unet-template
                    depends: "big-assets-l1"
                    when: "{{workflow.parameters.tower--tower-rust-devide}} == true"
                    arguments:
                        parameters: 
                        - name: inference-file
                          value: "unet_multi_model_devide.py"
                        - name: assets
                          value: '{{workflow.parameters.assets}}'
                        - name: grouped_assets
                          value: '["tower"]'
                        - name: src
                          value: "/input/{{workflow.parameters.folder_name}}/output/Level1/tower/"
                        - name: dest
                          value: "/input/{{workflow.parameters.folder_name}}/output/Level2/tower/"
                        - name: config
                          value: "/mnt/pipeline-configs/ukpn_v2/tower_rust_devide_l2.json"
                        - name: start_msg
                          value: '[]'
                        - name: end_msg
                          value: '["tower"]'

                  - name: tower-crossarms--tower-rust-devide
                    template: unet-template
                    depends: "big-assets-l1"
                    when: "{{workflow.parameters.tower-crossarms--tower-rust-devide}} == true"
                    arguments:
                        parameters: 
                        - name: inference-file
                          value: "unet_multi_model_devide.py"
                        - name: assets
                          value: '{{workflow.parameters.assets}}'
                        - name: grouped_assets
                          value: '["tower_crossarms"]'
                        - name: src
                          value: "/input/{{workflow.parameters.folder_name}}/output/Level1/tower_crossarms/"
                        - name: dest
                          value: "/input/{{workflow.parameters.folder_name}}/output/Level2/tower_crossarms/"
                        - name: config
                          value: "/mnt/pipeline-configs/ukpn_v2/tower_rust_devide_l2.json"
                        - name: start_msg
                          value: '[]'
                        - name: end_msg
                          value: '["tower_crossarms"]'
                  
                  - name: tower-leg--tower-rust-devide
                    template: unet-template
                    depends: "big-assets-l1"
                    when: "{{workflow.parameters.tower-leg--tower-rust-devide}} == true"
                    arguments:
                        parameters: 
                        - name: inference-file
                          value: "unet_multi_model_devide.py"
                        - name: assets
                          value: '{{workflow.parameters.assets}}'
                        - name: grouped_assets
                          value: '["tower_leg"]'
                        - name: src
                          value: "/input/{{workflow.parameters.folder_name}}/output/Level1/tower_leg/"
                        - name: dest
                          value: "/input/{{workflow.parameters.folder_name}}/output/Level2/tower_leg/"
                        - name: config
                          value: "/mnt/pipeline-configs/ukpn_v2/tower_rust_devide_l2.json"
                        - name: start_msg
                          value: '[]'
                        - name: end_msg
                          value: '["tower_leg"]'

                  - name: tower-peak--tower-rust-devide
                    template: unet-template
                    depends: "big-assets-l1"
                    when: "{{workflow.parameters.tower-peak--tower-rust-devide}} == true"
                    arguments:
                        parameters: 
                        - name: inference-file
                          value: "unet_multi_model_devide.py"
                        - name: assets
                          value: '{{workflow.parameters.assets}}'
                        - name: grouped_assets
                          value: '["tower_peak"]'
                        - name: src
                          value: "/input/{{workflow.parameters.folder_name}}/output/Level1/tower_peak/"
                        - name: dest
                          value: "/input/{{workflow.parameters.folder_name}}/output/Level2/tower_peak/"
                        - name: config
                          value: "/mnt/pipeline-configs/ukpn_v2/tower_rust_devide_l2.json"
                        - name: start_msg
                          value: '[]'
                        - name: end_msg
                          value: '["tower_peak"]'
                                    
                  - name: tower-muff-l2
                    template: detectron2-template
                    depends: "big-assets-l1"
                    when: "{{workflow.parameters.tower-muff-l2}} == true"
                    arguments:
                        parameters: 
                        - name: assets
                          value: '{{workflow.parameters.assets}}'
                        - name: grouped_assets
                          value: '["tower_muff"]'
                        - name: src
                          value: "/input/{{workflow.parameters.folder_name}}/output/Level1/tower_muff"
                        - name: dest
                          value: "/input/{{workflow.parameters.folder_name}}/output/Level2/tower_muff"
                        - name: config
                          value: "/mnt/pipeline-configs/ukpn_v2/tower_muff_l2.json"
                        - name: start_msg
                          value: '[]'
                        - name: end_msg
                          value: '["tower_muff"]'

                  - name: vegetation-l2
                    template: efficient-d2-template
                    depends: "big-assets-l1"
                    when: "{{workflow.parameters.vegetation-l2}} == true"
                    arguments:
                        parameters: 
                        - name: assets
                          value: '{{workflow.parameters.assets}}'
                        - name: grouped_assets
                          value: '[]'
                        - name: src
                          value: "/input/{{workflow.parameters.folder_name}}/output/Level1/tower_leg"
                        - name: dest
                          value: "/input/{{workflow.parameters.folder_name}}/output/Level2/vegetation"
                        - name: config
                          value: "/mnt/pipeline-configs/ukpn_v2/ukpn_vegetation.json"
                        - name: start_msg
                          value: '[]'
                        - name: end_msg
                          value: '["vegetation"]'
      
                  #  small assets L2 ----------------------------------

                  - name: earthwire-detection
                    template: detectron2-template
                    depends: "small-assets-l1.Succeeded"
                    when: "{{workflow.parameters.earthwire-detection}} == true"
                    arguments:
                        parameters: 
                        - name: assets
                          value: '{{workflow.parameters.assets}}'
                        - name: grouped_assets
                          value: '[]'
                        - name: src
                          value: "/input/{{workflow.parameters.folder_name}}/output/Level1/earthwire_connection"
                        - name: dest
                          value: "/input/{{workflow.parameters.folder_name}}/output/Level2/earthwire_connection"
                        - name: config
                          value: "/mnt/pipeline-configs/ukpn_v2/earthwire.json"
                        - name: start_msg
                          value: '[]'
                        - name: end_msg
                          value: '["earthwire_connection"]'

                  - name: vibration-damper-l2
                    template: unet-template
                    depends: "small-assets-l1"
                    when: "{{workflow.parameters.vibration-damper-l2}} == true"
                    arguments:
                        parameters: 
                        - name: inference-file
                          value: "multi_unet_new.py"
                        - name: assets
                          value: '{{workflow.parameters.assets}}'
                        - name: grouped_assets
                          value: '[]'
                        - name: src
                          value: "/input/{{workflow.parameters.folder_name}}/output/Level1/vibration_damper/"
                        - name: dest
                          value: "/input/{{workflow.parameters.folder_name}}/output/Level2/vibration_damper/"
                        - name: config
                          value: "/mnt/pipeline-configs/ukpn_v2/vibration_damper_l2.json"
                        - name: start_msg
                          value: '[]'
                        - name: end_msg
                          value: '["vibration_damper"]'

                  #  small assets L15 ----------------------------------

                  - name: arcing-horn-l2
                    template: unet-template
                    depends: "small-assets-l1.Succeeded && small-assets-l15.Succeeded"
                    when: "{{workflow.parameters.arcing-horn-l2}} == true"
                    arguments:
                        parameters: 
                        - name: inference-file
                          value: "multi_unet_new.py"
                        - name: assets
                          value: '{{workflow.parameters.assets}}'
                        - name: grouped_assets
                          value: '[]'
                        - name: src
                          value: "/input/{{workflow.parameters.folder_name}}/output/Level1/arcing_horn/"
                        - name: dest
                          value: "/input/{{workflow.parameters.folder_name}}/output/Level2/arcing_horn/"
                        - name: config
                          value: "/mnt/pipeline-configs/ukpn_v2/arcing_horn_l2.json"
                        - name: start_msg
                          value: '[]'
                        - name: end_msg
                          value: '["arcing_horn"]'

                  - name: glass-insulator--disc-damage-l2
                    template: detectron2-template
                    depends: "small-assets-l1.Succeeded && small-assets-l15.Succeeded"
                    when: "{{workflow.parameters.glass-insulator--disc-damage-l2}} == true"
                    arguments:
                        parameters: 
                        - name: assets
                          value: '{{workflow.parameters.assets}}'
                        - name: grouped_assets
                          value: '["glass_insulator"]'
                        - name: src
                          value: "/input/{{workflow.parameters.folder_name}}/output/Level1/glass_insulator"
                        - name: dest
                          value: "/input/{{workflow.parameters.folder_name}}/output/Level2/glass_insulator"
                        - name: config
                          value: "/mnt/pipeline-configs/ukpn_v2/disc_damage_l2.json"
                        - name: start_msg
                          value: '[]'
                        - name: end_msg
                          value: '["glass_insulator"]'

                  - name: polymer-insulator--disc-damage-l2
                    template: detectron2-template
                    depends: "small-assets-l1.Succeeded && small-assets-l15.Succeeded"
                    when: "{{workflow.parameters.polymer-insulator--disc-damage-l2}} == true"
                    arguments:
                        parameters: 
                        - name: assets
                          value: '{{workflow.parameters.assets}}'
                        - name: grouped_assets
                          value: '["polymer_insulator"]'
                        - name: src
                          value: "/input/{{workflow.parameters.folder_name}}/output/Level1/polymer_insulator"
                        - name: dest
                          value: "/input/{{workflow.parameters.folder_name}}/output/Level2/polymer_insulator"
                        - name: config
                          value: "/mnt/pipeline-configs/ukpn_v2/disc_damage_l2.json"
                        - name: start_msg
                          value: '[]'
                        - name: end_msg
                          value: '["polymer_insulator"]'

                  - name: porcelain-insulator--disc-damage-l2
                    template: detectron2-template
                    depends: "small-assets-l1.Succeeded && small-assets-l15.Succeeded"
                    when: "{{workflow.parameters.porcelain-insulator--disc-damage-l2}} == true"
                    arguments:
                        parameters: 
                        - name: assets
                          value: '{{workflow.parameters.assets}}'
                        - name: grouped_assets
                          value: '["porcelain_insulator"]'
                        - name: src
                          value: "/input/{{workflow.parameters.folder_name}}/output/Level1/porcelain_insulator"
                        - name: dest
                          value: "/input/{{workflow.parameters.folder_name}}/output/Level2/porcelain_insulator"
                        - name: config
                          value: "/mnt/pipeline-configs/ukpn_v2/disc_damage_l2.json"
                        - name: start_msg
                          value: '[]'
                        - name: end_msg
                          value: '["porcelain_insulator"]'

                  - name: shackles-l2
                    template: unet-template
                    depends: "small-assets-l1.Succeeded && small-assets-l15.Succeeded"
                    when: "{{workflow.parameters.shackles-l2}} == true"
                    arguments:
                        parameters: 
                        - name: inference-file
                          value: "multi_unet_new.py"
                        - name: assets
                          value: '{{workflow.parameters.assets}}'
                        - name: grouped_assets
                          value: '[]'
                        - name: src
                          value: "/input/{{workflow.parameters.folder_name}}/output/Level1/shackles/"
                        - name: dest
                          value: "/input/{{workflow.parameters.folder_name}}/output/Level2/shackles/"
                        - name: config
                          value: "/mnt/pipeline-configs/ukpn_v2/shackles_l2.json"
                        - name: start_msg
                          value: '[]'
                        - name: end_msg
                          value: '["shackles"]'
                  
                  - name: suspension-clamp-l2
                    template: unet-template
                    depends: "small-assets-l1.Succeeded && small-assets-l15.Succeeded"
                    when: "{{workflow.parameters.suspension-clamp-l2}} == true"
                    arguments:
                        parameters: 
                        - name: inference-file
                          value: "single_unet_new.py"
                        - name: assets
                          value: '{{workflow.parameters.assets}}'
                        - name: grouped_assets
                          value: '[]'
                        - name: src
                          value: "/input/{{workflow.parameters.folder_name}}/output/Level1/suspension_clamp/"
                        - name: dest
                          value: "/input/{{workflow.parameters.folder_name}}/output/Level2/suspension_clamp/"
                        - name: config
                          value: "/mnt/pipeline-configs/ukpn_v2/suspension_clamp_l2.json"
                        - name: start_msg
                          value: '[]'
                        - name: end_msg
                          value: '["suspension_clamp"]'

                  - name: tension-clamp-l2
                    template: unet-template
                    depends: "small-assets-l1.Succeeded && small-assets-l15.Succeeded"
                    when: "{{workflow.parameters.tension-clamp-l2}} == true"
                    arguments:
                        parameters: 
                        - name: inference-file
                          value: "single_unet_new.py"
                        - name: assets
                          value: '{{workflow.parameters.assets}}'
                        - name: grouped_assets
                          value: '[]'
                        - name: src
                          value: "/input/{{workflow.parameters.folder_name}}/output/Level1/tension_clamp/"
                        - name: dest
                          value: "/input/{{workflow.parameters.folder_name}}/output/Level2/tension_clamp/"
                        - name: config
                          value: "/mnt/pipeline-configs/ukpn_v2/tension_clamp_l2.json"
                        - name: start_msg
                          value: '[]'
                        - name: end_msg
                          value: '["tension_clamp"]'

                  #  birdnest and label ----------------------------------

                  - name: birdnest--birdnest-and-label
                    template: detectron2-template
                    depends: "birdnest-and-label"
                    when: "{{workflow.parameters.birdnest--birdnest-and-label}} == true"
                    arguments:
                        parameters: 
                        - name: assets
                          value: '{{workflow.parameters.assets}}'
                        - name: grouped_assets
                          value: '["birdnest"]'
                        - name: src
                          value: "/input/{{workflow.parameters.folder_name}}/output/Level1/birdnest"
                        - name: dest
                          value: "/input/{{workflow.parameters.folder_name}}/output/Level2/birdnest"
                        - name: config 
                          value: "/mnt/pipeline-configs/ukpn_v2/birdnest_l2.json"
                        - name: start_msg
                          value: '[]'
                        - name: end_msg
                          value: '["birdnest"]'

                  - name: marker--birdnest-and-label
                    template: detectron2-template
                    depends: "birdnest-and-label"
                    when: "{{workflow.parameters.marker--birdnest-and-label}} == true"
                    arguments:
                        parameters: 
                        - name: assets
                          value: '{{workflow.parameters.assets}}'
                        - name: grouped_assets
                          value: '["marker"]'
                        - name: src
                          value: "/input/{{workflow.parameters.folder_name}}/output/Level1/marker"
                        - name: dest
                          value: "/input/{{workflow.parameters.folder_name}}/output/Level2/marker"
                        - name: config
                          value: "/mnt/pipeline-configs/ukpn_v2/birdnest_l2.json"
                        - name: start_msg
                          value: '[]'
                        - name: end_msg
                          value: '["marker"]'


                  #  merge small assets ----------------------------------

                  - name: merge-outputs
                    template: merge-outputs-template
                    depends: "small-assets-l1.Succeeded && small-assets-l15.Succeeded && earthwire-detection.Succeeded"
                    arguments:
                        parameters: 
                        - name: src
                          value: "/input/{{workflow.parameters.folder_name}}/"
                        - name: dest
                          value: "/input/{{workflow.parameters.folder_name}}/output/Level2/all_small_assets/concat/"
                        - name: config
                          value: "/mnt/pipeline-configs/ukpn_v2/merge_small_assets.json"
                        - name: start_msg
                          value: '[]'
                        - name: end_msg
                          value: '[]'

                  #  automate ----------------------------------

                  - name: automate-report-generation
                    template: automate-report-generation-template
                    depends: >-
                      lockpin.Succeeded || lockpin.Skipped &&
                      tower--tower-rust-devide.Succeeded || tower--tower-rust-devide.Skipped &&
                      tower-crossarms--tower-rust-devide.Succeeded || tower-crossarms--tower-rust-devide.Skipped &&
                      tower-leg--tower-rust-devide.Succeeded || tower-leg--tower-rust-devide.Skipped &&
                      tower-peak--tower-rust-devide.Succeeded || tower-peak--tower-rust-devide.Skipped &&
                      tower-muff-l2.Succeeded || tower-muff-l2.Skipped &&
                      vegetation-l2.Succeeded || vegetation-l2.Skipped &&
                      earthwire-detection.Succeeded || earthwire-detection.Skipped &&
                      vibration-damper-l2.Succeeded || vibration-damper-l2.Skipped &&
                      arcing-horn-l2.Succeeded || arcing-horn-l2.Skipped &&
                      glass-insulator--disc-damage-l2.Succeeded || glass-insulator--disc-damage-l2.Skipped &&
                      polymer-insulator--disc-damage-l2.Succeeded || polymer-insulator--disc-damage-l2.Skipped &&
                      porcelain-insulator--disc-damage-l2.Succeeded || porcelain-insulator--disc-damage-l2.Skipped &&
                      shackles-l2.Succeeded || shackles-l2.Skipped &&
                      suspension-clamp-l2.Succeeded || suspension-clamp-l2.Skipped &&
                      tension-clamp-l2.Succeeded || tension-clamp-l2.Skipped &&
                      birdnest--birdnest-and-label.Succeeded || birdnest--birdnest-and-label.Skipped &&
                      marker--birdnest-and-label.Succeeded || marker--birdnest-and-label.Skipped &&
                      merge-outputs.Succeeded || merge-outputs.Skipped

                    arguments:
                        parameters: 
                        - name: src
                          value: "/input/{{workflow.parameters.folder_name}}/"
                        - name: dest
                          value: "/input/{{workflow.parameters.folder_name}}/output/"
                        - name: config
                          value: "/mnt/pipeline-configs/ukpn_v2/automate.json"
                        - name: start_msg
                          value: '[]'
                        - name: end_msg
                          value: '["Celery Job"]'
                        


          - name: detectron2-template
            inputs:
                parameters:
                    - name:  src
                    - name:  dest
                    - name:  assets     
                    - name:  grouped_assets                    
                    - name:  config
                    - name:  start_msg
                    - name:  end_msg

            container:
                # image: us-central1-docker.pkg.dev/utilities-vision/uvision-kubernetes-deployment/detectron2-cli-input:python-3.12.11-cuda-12.1.1-cudnn8-runtime-ubuntu22.04  # Replace with your ML job image
                image: us-central1-docker.pkg.dev/utilities-vision/uvision-kubernetes-deployment/test/detectron2-cli-input:python-3.12.11-cuda-12.1.1-cudnn8-runtime-ubuntu22.04  # Replace with your ML job image
                imagePullPolicy: Always
                command: ["python", "detectron2_inference.py"]
